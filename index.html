<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/png" href="img/montana.png">

  <title>Lista de Animes</title>
  <style>
    body {
      margin: 0;
      padding: 20px;
      font-family: 'Segoe UI', sans-serif;
      background-color: #fffaf0;
      color: #2d2d2d;
      position: relative;
      overflow-x: hidden;
    }

    .background-images {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
      overflow: hidden;
    }

    .background-images img {
      position: absolute;
      width: 300px;
      height: auto;
      opacity: 0.15;
      object-fit: contain;
      transform: rotateZ(var(--angle, 0deg));
    }

    h1 {
      text-align: center;
      color: #5c4d3b;
      margin-bottom: 20px;
    }

    form {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      margin-bottom: 30px;
    }

    input[type="text"] {
      padding: 10px;
      font-size: 16px;
      width: 90%;
      max-width: 400px;
      border: 1px solid #ccc;
      border-radius: 8px;
      background: #fdf6e3;
      color: #333;
    }

    button {
      padding: 10px 20px;
      background-color: #b8936c;
      border: none;
      color: white;
      font-weight: bold;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.3s;
    }

    button:hover {
      background-color: #8c6e4f;
    }

    .anime-list {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .anime-card {
      background-color: rgba(255, 255, 255, 0.85);
      width: 90%;
      max-width: 500px;
      padding: 15px;
      margin-bottom: 15px;
      border-radius: 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
      position: relative;
    }

    .title {
      font-size: 18px;
      font-weight: bold;
    }

    .estado-select {
      padding: 6px;
      border-radius: 8px;
      border: none;
      background-color: #eee;
      color: #333;
      font-weight: bold;
    }

    .pendiente {
      background-color: rgba(255, 255, 255, 0.85) !important;
    }

    .viendo {
      background-color: rgba(208, 230, 255, 0.85) !important;
    }

    .visto {
      background-color: rgba(208, 255, 214, 0.85) !important;
    }

    @media (max-width: 600px) {
      .anime-card {
        flex-direction: column;
        align-items: flex-start;
        gap: 10px;
      }
    }

    /* Responsive para imágenes de fondo en celular */
    @media (max-width: 480px) {
      .background-images img {
        width: 100px;
        opacity: 0.1;
      }

      .anime-card {
        width: 95%;
        padding: 12px;
        gap: 6px;
        flex-direction: column;
        align-items: flex-start;
      }

      .title {
        font-size: 16px;
      }

      .estado-select {
        font-size: 14px;
      }
    }

    @media (max-width: 768px) {
      .background-images img {
        width: 180px;
        opacity: 0.12;
      }

      .anime-card {
        width: 95%;
      }
    }

    .modal {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.6);
  justify-content: center;
  align-items: center;
  z-index: 999;
}

.modal-content {
  background: #fffaf0;
  padding: 25px;
  border-radius: 15px;
  text-align: center;
  width: 80%;
  max-width: 350px;
  box-shadow: 0 5px 20px rgba(0,0,0,0.3);
  animation: aparecer 0.3s ease;
}

.modal-content h2 {
  margin-bottom: 10px;
}

.modal-content p {
  font-size: 20px;
  font-weight: bold;
  margin-bottom: 20px;
}

@keyframes aparecer {
  from {
    transform: scale(0.7);
    opacity: 0;
  }
  to {
    transform: scale(1);
    opacity: 1;
  }
}

    #buscador {
  padding: 10px;
  margin-bottom: 20px;
  width: 90%;
  max-width: 400px;
  border-radius: 8px;
  border: 1px solid #ccc;
  background: #fdf6e3;
}
  </style>
</head>

<body>

  <div id="contenido">
  <div class="background-images">
    <img src="img/img1.png" style="top: 5%; left: 10%; --angle: 5deg;">
    <img src="img/img2.png" style="top: 5%; left: 62%; --angle: -10deg;">
    <img src="img/img3.png" style="top: 40%; left: 30%; --angle: 15deg;">
    <img src="img/img4.png" style="top: 70%; left: 55%; --angle: -5deg;">
    <img src="img/img5.png" style="top: 35%; left: 57%; --angle: 10deg;">
    <img src="img/img6.png" style="top: 2%; left: 35%; --angle: -15deg;">
    <img src="img/img7.png" style="top: 70%; left: 5%; --angle: 20deg;">
    <img src="img/img8.png" style="top: 75%; left: 30%; --angle: -20deg;">
    <img src="img/img9.png" style="top: 35%; left: 80%; --angle: 25deg;">
    <img src="img/img10.png" style="top: 30%; left: 5%; --angle: -25deg;">
    <img src="img/img11.png" style="top: 70%; left: 80%; --angle: 0deg;">
    <img src="img/img12.png" style="top: 3%; left: 86%; --angle: 20deg;">
  </div>

  <h1>🎌 Mi Lista de Anime 🎌</h1>
  <div id="contador" style="text-align:center; font-weight:bold; margin-bottom: 20px;"></div>
  <input type="text" id="buscador" placeholder="🔍 Buscar anime..."/>

  <form id="animeForm">
    <button type="button" id="randomBtn">🎲 Elegir anime aleatorio</button>
    <input type="text" id="animeInput" placeholder="Agregar anime...">
    <button type="submit">Agregar</button>
  </form>

  <div class="anime-list" id="animeList"></div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.8.1/firebase-app.js";
    import { getFirestore, collection, addDoc, getDocs, doc, updateDoc } from "https://www.gstatic.com/firebasejs/11.8.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBZREuJG5uxyU8f14HgN9PahXVvCeCUYxE",
      authDomain: "anime-da161.firebaseapp.com",
      projectId: "anime-da161",
      storageBucket: "anime-da161.appspot.com",
      messagingSenderId: "419282579591",
      appId: "1:419282579591:web:5b6964b0c0f08715ab4822",
      measurementId: "G-X67ZPWM8LH"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const animeForm = document.getElementById("animeForm");
    const animeInput = document.getElementById("animeInput");
    const animeList = document.getElementById("animeList");
    const randomBtn = document.getElementById("randomBtn");
    const buscador = document.getElementById("buscador");

    async function renderLista() {
  animeList.innerHTML = "";
  const querySnapshot = await getDocs(collection(db, "animes"));

  let animes = [];
  const textoBusqueda = buscador.value.toLowerCase();
  let contador = { visto: 0, viendo: 0, pendiente: 0 };

  querySnapshot.forEach(docSnapshot => {
    const anime = docSnapshot.data();
    anime.id = docSnapshot.id;
    animes.push(anime);
    contador[anime.estado]++;
  });

      //seleccion de anime al azar estando en pendiente
   const randomBtn = document.getElementById("randomBtn");

randomBtn.addEventListener("click", async () => {
  const querySnapshot = await getDocs(collection(db, "animes"));

  let pendientes = [];
  let pendientesDocs = [];

  querySnapshot.forEach(docSnapshot => {
    const anime = docSnapshot.data();
    if (anime.estado === "pendiente") {
      pendientes.push(anime.nombre);
      pendientesDocs.push({
        id: docSnapshot.id,
        ...anime
      });
    }
  });

  if (pendientes.length === 0) {
    alert("No tienes animes pendientes 😅");
    return;
  }

  const randomIndex = Math.floor(Math.random() * pendientes.length);
  const randomAnime = pendientesDocs[randomIndex];

  // 🔥 Cambiar automáticamente a "viendo"
  await updateDoc(doc(db, "animes", randomAnime.id), {
    estado: "viendo"
  });

  // 🔔 Mostrar SOLO UNA alerta
  mostrarModal(randomAnime.nombre);

  // 🔄 Recargar lista
  renderLista();
});

  // Ordenar
  animes.sort((a, b) => {
    const order = { "viendo": 0, "pendiente": 1, "visto": 2 };
    return order[a.estado] - order[b.estado];
  });

  // Mostrar contador
  document.getElementById("contador").innerHTML = `
    ✅ Vistos: ${contador.visto} | 👁️ Viendo: ${contador.viendo} | 🕒 Pendientes: ${contador.pendiente}
  `;

  // Crear tarjetas
  animes
  .filter(anime => anime.nombre.toLowerCase().includes(textoBusqueda))
  .forEach(anime => {
    const card = document.createElement("div");
    card.className = `anime-card ${anime.estado}`;

    const title = document.createElement("div");
    title.className = "title";
    title.textContent = anime.nombre;

    const select = document.createElement("select");
    select.className = `estado-select ${anime.estado}`;
    select.innerHTML = `
      <option value="pendiente">Pendiente</option>
      <option value="viendo">Viendo</option>
      <option value="visto">Visto</option>
    `;
    select.value = anime.estado;
    select.addEventListener("change", async (e) => {
      await updateDoc(doc(db, "animes", anime.id), {
        estado: e.target.value,
      });
      renderLista(); // vuelve a contar y renderizar
    });

    card.appendChild(title);
    card.appendChild(select);
    animeList.appendChild(card);
  });
}
    buscador.addEventListener("input", () => {
  renderLista();
});


    animeForm.addEventListener("submit", async (e) => {
      e.preventDefault();
      const nombre = animeInput.value.trim();
      const nombreLower = nombre.toLowerCase();
      if (nombre !== "") {
        const querySnapshot = await getDocs(collection(db, "animes"));

let existe = false;

querySnapshot.forEach(doc => {
  if (doc.data().nombre.toLowerCase() === nombreLower) {
    existe = true;
  }
});

if (existe) {
  alert("⚠️ Ese anime ya está en tu lista");
  return;
}
        await addDoc(collection(db, "animes"), {
          nombre,
          estado: "pendiente"
        });
        animeInput.value = "";
        renderLista();
      }
    });

    renderLista();
  </script>

  </div>

    <script>
    const password = "Godie123456";
    let entered = prompt("Ingresa la contraseña para ver tu lista de anime:");

    if (entered === password) {
      document.getElementById("contenido").style.display = "block";
    } else {
      document.body.innerHTML = "<h2 style='text-align:center; margin-top:50px;'>Acceso denegado<br>Contraseña incorrecta.</h2>";
    }
  </script>

  <script>
function mostrarModal(nombre) {
  document.getElementById("modalAnime").textContent = nombre;
  document.getElementById("modal").style.display = "flex";
}

function cerrarModal() {
  document.getElementById("modal").style.display = "none";
}
</script>

  <div id="modal" class="modal">
  <div class="modal-content">
    <h2>🎬 Ahora estás viendo</h2>
    <p id="modalAnime"></p>
    <button onclick="cerrarModal()">Cerrar</button>
  </div>
</div>


</body>

</html>
